name: MedRetailer Cross-Platform Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Analyze Flutter Code (Non-Fatal warnings)
        run: |
          cd med_retailer_flutter
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings || echo "Lint warnings found, proceeding with build..."

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Generate Platforms and Custom Settings
        run: |
          cd med_retailer_flutter
          flutter pub get
          flutter create --platforms=android --org com.pims .
          python3 setup_runners.py

      - name: Show Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - name: Build APK (verbose)
        run: |
          cd med_retailer_flutter
          set -o pipefail
          flutter build apk --release --verbose > build_log.txt 2>&1 || { echo "Build failed"; exit 1; }

      - name: Commit and Push Build Log
        if: failure()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git checkout -b debug-logs
          cp med_retailer_flutter/build_log.txt ./build_log.txt
          git add build_log.txt
          git commit -m "Upload Android build log"
          git push origin debug-logs -f

      - name: Find APK file
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: medretailer-android-release
          path: |
            med_retailer_flutter/build/app/outputs/flutter-apk/app-release.apk
            med_retailer_flutter/build/app/outputs/apk/release/app-release.apk
          if-no-files-found: warn

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Generate Platforms and Custom Settings
        run: |
          cd med_retailer_flutter
          flutter pub get
          flutter create --platforms=ios --org com.pims .
          python3 setup_runners.py

      - name: Build iOS App Bundle (Unsigned)
        run: |
          cd med_retailer_flutter
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd med_retailer_flutter
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios
          zip -r MedRetailer.ipa Payload
          echo "IPA packaging successful!"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: medretailer-ios-release
          path: med_retailer_flutter/build/ios/MedRetailer.ipa
